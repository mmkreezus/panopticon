kground:#e2e8f0;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#475569;\">${u.initials}<\u002Fspan>${u.name}<\u002Fspan>`).join('')}<\u002Fdiv>` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-scorecard-grid\">\n        <div class=\"proj-scorecard ${tpC}\">\n          <div class=\"proj-scorecard-label\">Task Progress<\u002Fdiv>\n          <div class=\"proj-scorecard-value ${tpC}\">${p.taskProgress}<span style=\"font-size:17px;color:#94a3b8;font-weight:600;\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"proj-scorecard-sub\">${p.tasks.filter(t=>t.status==='DONE').length}/${p.tasks.length} done<\u002Fdiv>\n          <div class=\"proj-scorecard-status ${tpC}\">${progressLabel(p.taskProgress)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-scorecard ${mpC}\">\n          <div class=\"proj-scorecard-label\">Milestone Progress<\u002Fdiv>\n          <div class=\"proj-scorecard-value ${mpC}\">${p.milestoneProgress}<span style=\"font-size:17px;color:#94a3b8;font-weight:600;\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"proj-scorecard-sub\">weighted — ${p.milestones.length} milestones<\u002Fdiv>\n          <div class=\"proj-scorecard-status ${mpC}\">${progressLabel(p.milestoneProgress)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-scorecard ${blC}\">\n          <div class=\"proj-scorecard-label\">Open Blockers<\u002Fdiv>\n          <div class=\"proj-scorecard-value ${blC}\">${p.openBlockers}<\u002Fdiv>\n          <div class=\"proj-scorecard-sub\">${p.openBlockers===0?'No blockers':p.openBlockers+' task(s) blocked'}<\u002Fdiv>\n          <div class=\"proj-scorecard-status ${blC}\">${p.openBlockers===0?'Clear':'Action required'}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-scorecard blue\">\n          <div class=\"proj-scorecard-label\">Priority Score<\u002Fdiv>\n          <div class=\"proj-scorecard-value\">${p.priorityScore}<\u002Fdiv>\n          <div class=\"proj-scorecard-sub\">${p.priorityRating} — ${p.owner?p.owner.name:'--'}<\u002Fdiv>\n          <div class=\"proj-scorecard-status\" style=\"color:#94a3b8;\">Timeline: ${expectedTimelineProgress(p,NOW)}% elapsed<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      ${flags.length?`<div class=\"signal-flags\">${flags.map(f=>`<div class=\"signal-flag\">${f}<\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n}\n\nfunction renderOwnerLegend(p) {\n  const owners = collectProjectOwners(p);\n  if (!owners.length) return '';\n  return `<div class=\"owner-legend\">\n    <span class=\"owner-legend-label\">Owners<\u002Fspan>\n    ${owners.map(u=>`<span class=\"owner-legend-item\"><span class=\"owner-legend-initials\">${u.initials}<\u002Fspan><span style=\"color:#374151;font-weight:600;\">${u.name}<\u002Fspan><\u002Fspan>`).join('')}\n  <\u002Fdiv>`;\n}\n\nfunction renderChangeLog(p) {\n  let allLogs = [...p.logs].sort((a,b)=>b.timestamp-a.timestamp);\n\n  // Apply user filter\n  if (STATE.logFilterUser !== 'all') {\n    allLogs = allLogs.filter(l => l.userId === STATE.logFilterUser);\n  }\n  // Apply type filter\n  if (STATE.logFilterType !== 'all') {\n    allLogs = allLogs.filter(l => l.type === STATE.logFilterType);\n  }\n\n  const showAll = STATE.logExpanded;\n  const visible = showAll ? allLogs : allLogs.slice(0,3);\n  const remaining = allLogs.length - 3;\n\n  // Build user filter options -- show every team member, no clutter\n  const userOptions = ['<option value=\"all\">All names<\u002Foption>']\n    .concat(Object.values(USERS).sort((a,b)=>a.name.localeCompare(b.name))\n      .map(u => `<option value=\"${u.id}\" ${STATE.logFilterUser===u.id?'selected':''}>${u.name}<\u002Foption>`))\n    .join('');\n\n  const typeOptions = [\n    ['all','All types'],\n    ['MANUAL','Manual entry'],\n    ['TASK_STATUS','Task status'],\n    ['TASK_BLOCKED','Task blocked'],\n    ['TASK_UNBLOCKED','Task unblocked'],\n    ['CRITERIA_TOGGLE','Criterion toggle'],\n    ['MILESTONE_COMPLETE','Milestone complete'],\n  ].map(([v,l]) => `<option value=\"${v}\" ${STATE.logFilterType===v?'selected':''}>${l}<\u002Foption>`).join('');\n\n  const isFiltered = STATE.logFilterUser !== 'all' || STATE.logFilterType !== 'all';\n\n  const filterBar = `<div class=\"log-filter-bar\">\n    <span class=\"log-filter-label\">Filter<\u002Fspan>\n    <select class=\"log-filter-select\" onchange=\"setLogFilter('user', this.value)\">${userOptions}<\u002Fselect>\n    <select class=\"log-filter-select\" onchange=\"setLogFilter('type', this.value)\">${typeOptions}<\u002Fselect>\n    ${isFiltered ? `<span class=\"log-filter-clear\" onclick=\"clearLogFilter()\">Clear<\u002Fspan>` : ''}\n    <span style=\"margin-left:auto;font-size:11px;color:#94a3b8;font-weight:600;\">${allLogs.length} entr${allLogs.length===1?'y':'ies'}${isFiltered?' (filtered)':''}<\u002Fspan>\n  <\u002Fdiv>`;\n\n  const logItems = visible.length === 0\n    ? `<div class=\"log-empty\">No entries match the current filter.<\u002Fdiv>`\n    : visible.map(l=>{\n        const u=l.userId?getUser(l.userId):null;\n        return `<div class=\"log-item type-${l.type}\"><div class=\"log-meta\"><span class=\"log-type\">${l.type}<\u002Fspan>${fmtDateTime(l.timestamp)}${u?' -- '+u.name:''}<\u002Fdiv><div class=\"log-desc\">${l.description}<\u002Fdiv><\u002Fdiv>`;\n      }).join('');\n\n  const toggleBtn = !showAll && remaining > 0\n    ? `<div style=\"text-align:center;margin-top:12px;\"><button class=\"sort-btn\" onclick=\"toggleLogExpanded()\">Show ${remaining} more<\u002Fbutton><\u002Fdiv>`\n    : showAll && allLogs.length > 3\n      ? `<div style=\"text-align:center;margin-top:12px;\"><button class=\"sort-btn\" onclick=\"toggleLogExpanded()\">Show less<\u002Fbutton><\u002Fdiv>`\n      : '';\n\n  const currentUser = USERS[STATE.currentUserId];\n  const authorLabel = currentUser ? currentUser.name : '—';\n\n  return `<div class=\"card no-lift\">\n    <div class=\"card-header\"><div class=\"card-title\">Change Log<\u002Fdiv><div class=\"card-subtitle\">Last ${visible.length} of ${allLogs.length}<\u002Fdiv><\u002Fdiv>\n    <div class=\"log-entry-form\">\n      <textarea class=\"log-textarea\" id=\"manual-log-input\" placeholder=\"Add a manual entry...\"><\u002Ftextarea>\n      <div style=\"margin-top:10px;display:flex;align-items:center;gap:10px;\">\n        <span style=\"font-size:11px;color:#94a3b8;font-weight:700;\">Posting as <span style=\"color:#1d4ed8;\">${authorLabel}<\u002Fspan><\u002Fspan>\n        <button class=\"log-submit\" onclick=\"submitManualLog('${p.id}')\">Add Entry<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${filterBar}\n    <div class=\"log-list\">${logItems}<\u002Fdiv>\n    ${toggleBtn}\n  <\u002Fdiv>`;\n}\n\n\n\nfunction renderTasksCard(p) {\n  const em = STATE.isEditMode;\n  const wsList = [...p.workstreams].sort((a,b)=>a.order-b.order);\n  return `<div class=\"card no-lift\">\n    <div class=\"card-header\">\n      <div><div class=\"card-title\">Workstreams &amp; Tasks<\u002Fdiv><div class=\"card-subtitle\">Click row to expand<\u002Fdiv><\u002Fdiv>\n      ${em ? `<button class=\"btn small ghost\" onclick=\"addWorkstream('${p.id}')\">+ Workstream<\u002Fbutton>` : ''}\n    <\u002Fdiv>\n    ${wsList.length === 0 ? `<div style=\"padding:18px;text-align:center;color:#94a3b8;font-weight:600;font-size:12px;\">${em ? 'No workstreams yet. Add one above.' : 'No workstreams yet.'}<\u002Fdiv>` : ''}\n    ${wsList.map(ws=>{\n      const wsTasks = p.tasks.filter(t=>t.workstreamId===ws.id);\n      const wsPct   = computeTaskProgress(wsTasks);\n      const wpC     = progressClass(wsPct);\n      const wsOwner = getUser(ws.ownerId);\n      return `<div class=\"workstream\">\n        <div class=\"workstream-header\">\n          <div><div class=\"workstream-name\">${ws.name}<\u002Fdiv><div class=\"workstream-owner\">${wsOwner?wsOwner.name:'(unassigned)'}<\u002Fdiv><\u002Fdiv>\n          <div class=\"workstream-progress\">\n            <span style=\"color:${progressColor(wpC)};font-weight:800;\">${wsPct}%<\u002Fspan>\n            <div class=\"progress-bar\" style=\"width:60px;\"><div class=\"progress-fill ${wpC==='green'?'':wpC}\" style=\"width:${wsPct}%\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        ${em ? `<button class=\"ws-edit-btn\" onclick=\"event.stopPropagation();removeWorkstream('${p.id}','${ws.id}')\">Remove<\u002Fbutton>` : ''}\n        <div class=\"task-header-row\"><div>Task<\u002Fdiv><div>Owner<\u002Fdiv><div>Status<\u002Fdiv><div>Start Date<\u002Fdiv><div style=\"text-align:right;\">Planned<\u002Fdiv><div style=\"text-align:right;\">Actual<\u002Fdiv><\u002Fdiv>\n        ${wsTasks.length === 0 ? `<div style=\"padding:14px 18px;color:#94a3b8;font-size:11px;font-weight:600;font-style:italic;\">${em ? 'No tasks yet.' : 'No tasks.'}<\u002Fdiv>` : ''}\n        ${wsTasks.map(t=>{\n          const owner  = getUser(t.ownerId);\n          const actual = computeActualEffort(t,p.logs,NOW);\n          const aDisp  = actual===null?'--':actual+'d';\n          const pDisp  = t.plannedEffortDays?t.plannedEffortDays+'d':'--';\n          const bucket = effortBucket(actual,t.plannedEffortDays);\n          const aClass = bucket==='red'?'red':bucket==='amber'?'amber':'';\n          const lastLog= lastStatusLog(t,p.logs);\n          const deps   = (t.dependencies||[]).map(id=>{const d=p.tasks.find(x=>x.id===id);return d?d.title:null;}).filter(Boolean);\n          const isExp  = STATE.expandedTaskId===t.id;\n          return `<div class=\"task-row${isExp?' expanded':''}${t.isCriticalPath?' cp-row':''}\" onclick=\"handleTaskRowClick(event,'${t.id}')\">\n            <div class=\"task-title\">${t.title}<\u002Fdiv>\n            <div><span class=\"task-owner-chip\" title=\"${owner?owner.name:''}\">${owner?owner.initials:'?'}<\u002Fspan><\u002Fdiv>\n            <div><select class=\"status-select ${t.status}\" onclick=\"event.stopPropagation()\" onchange=\"handleStatusChange('${p.id}','${t.id}',this.value,event)\">\n              <option value=\"TO_DO\"       ${t.status==='TO_DO'?'selected':''}>TO DO<\u002Foption>\n              <option value=\"IN_PROGRESS\" ${t.status==='IN_PROGRESS'?'selected':''}>IN PROGRESS<\u002Foption>\n              <option value=\"BLOCKED\"     ${t.status==='BLOCKED'?'selected':''}>BLOCKED<\u002Foption>\n              <option value=\"DONE\"        ${t.status==='DONE'?'selected':''}>DONE<\u002Foption>\n            <\u002Fselect><\u002Fdiv>\n            <div class=\"task-due\">${fmtDate(t.dueDate)}<\u002Fdiv>\n            <div class=\"task-planned\">${pDisp}<\u002Fdiv>\n            <div class=\"task-actual ${aClass}\">${aDisp}<\u002Fdiv>\n            ${em ? `<button class=\"row-action-btn\" onclick=\"event.stopPropagation();removeTask('${p.id}','${t.id}')\" title=\"Delete task\">&times;<\u002Fbutton>` : ''}\n          <\u002Fdiv>\n          ${isExp?`<div class=\"task-expand-detail\">\n            <div><div class=\"task-expand-section-label\">Dependencies<\u002Fdiv><div class=\"task-expand-value\">${deps.length?deps.join(', '):'<span style=\"color:#94a3b8;\">None<\u002Fspan>'}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"task-expand-section-label\">Last Status Change<\u002Fdiv><div class=\"task-expand-value task-expand-mono\">${lastLog?fmtDateTime(lastLog.timestamp)+' -- '+(getUser(lastLog.userId)?getUser(lastLog.userId).name:'--'):'No logged changes'}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"task-expand-section-label\">Timing (working days)<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\">Started: ${t.startedAt?fmtDateTime(t.startedAt):'--'}<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\" style=\"margin-top:4px;\">Completed: ${t.completedAt?fmtDateTime(t.completedAt):'--'}<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\" style=\"margin-top:4px;\">Planned: ${pDisp} -- Actual: ${aDisp}${bucket==='red'?' <span style=\"color:#dc2626;font-weight:800;\">(>150%)<\u002Fspan>':bucket==='amber'?' <span style=\"color:#d97706;\">(over plan)<\u002Fspan>':''}<\u002Fdiv>\n            <\u002Fdiv>\n            <div><div class=\"task-expand-section-label\">Meta<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\">Workstream: ${ws.name}<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\" style=\"margin-top:4px;\">Owner: ${owner?owner.name+' ('+owner.initials+')':'--'}<\u002Fdiv>\n              <div class=\"task-expand-value task-expand-mono\" style=\"margin-top:4px;\">Critical path: ${t.isCriticalPath?'Yes':'No'}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>`:''}`;\n        }).join('')}\n        ${em ? `<div class=\"add-task-row\">\n          <input type=\"text\" class=\"inline-add-text\" id=\"add-task-${ws.id}\" placeholder=\"Add task to ${ws.name}...\" onkeydown=\"if(event.key==='Enter'){addTask('${p.id}','${ws.id}');}\">\n          <button class=\"inline-add-btn\" onclick=\"addTask('${p.id}','${ws.id}')\">Add<\u002Fbutton>\n        <\u002Fdiv>` : ''}\n      <\u002Fdiv>`;\n    }).join('')}\n  <\u002Fdiv>`;\n}\n\nfunction renderMilestonesCard(p) {\n  const em = STATE.isEditMode;\n  return `<div class=\"card no-lift\">\n    <div class=\"card-header\">\n      <div class=\"card-title\">Milestones &amp; Criteria<\u002Fdiv>\n      ${em ? `<button class=\"btn small ghost\" onclick=\"addMilestone('${p.id}')\">+ Milestone<\u002Fbutton>` : ''}\n    <\u002Fdiv>\n    ${p.milestones.length === 0 ? `<div style=\"padding:18px;text-align:center;color:#94a3b8;font-weight:600;font-size:12px;\">${em ? 'No milestones yet. Add one above.' : 'No milestones yet.'}<\u002Fdiv>` : ''}\n    ${[...p.milestones].sort((a,b)=>a.order-b.order).map(m=>{\n      const done=m.criteria.filter(c=>c.completed).length, total=m.criteria.length;\n      const pct=total?Math.round((done/total)*100):0;\n      const mC=progressClass(pct), st=computeMilestoneStatus(m,NOW);\n      const fillColor=st==='OVERDUE'?'#dc2626':st==='AT_RISK'?'#d97706':progressColor(mC);\n      return `<div class=\"milestone\">\n        ${em ? `<button class=\"milestone-remove-btn\" onclick=\"removeMilestone('${p.id}','${m.id}')\">Remove milestone<\u002Fbutton>` : ''}\n        <div class=\"milestone-header\">\n          <div><div class=\"milestone-title\">${m.title}<\u002Fdiv><div class=\"milestone-target\">${m.targetQuarter} -- ${fmtDate(m.targetDate)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"milestone-progress-wrapper\">\n            ${st==='AT_RISK'?'<span class=\"pill at_risk\">At Risk<\u002Fspan>':''}\n            ${st==='OVERDUE'?'<span class=\"pill off_track\">Overdue<\u002Fspan>':''}\n            ${st==='DONE'?'<span class=\"pill on_track\">Done<\u002Fspan>':''}\n            <div class=\"milestone-progress-bar\"><div class=\"milestone-progress-fill\" style=\"width:${pct}%;background:${fillColor};\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"milestone-pct\" style=\"color:${fillColor};\">${pct}%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"criteria-list\">\n          ${m.criteria.length === 0 ? `<div style=\"font-size:11px;color:#94a3b8;font-weight:600;font-style:italic;padding:4px 8px;\">${em ? 'No criteria yet.' : 'No criteria.'}<\u002Fdiv>` : ''}\n          ${m.criteria.map(c=>`<label class=\"criteria-item\">\n            <input type=\"checkbox\" class=\"criteria-checkbox\" ${c.completed?'checked':''} onclick=\"handleCriteriaToggle(event,'${p.id}','${c.id}')\">\n            <span class=\"criteria-text ${c.completed?'done':''}\">${c.text}<\u002Fspan>\n            ${em ? `<button class=\"criteria-remove-btn\" onclick=\"event.preventDefault();event.stopPropagation();removeCriterion('${p.id}','${m.id}','${c.id}')\" title=\"Delete criterion\">&times;<\u002Fbutton>` : ''}\n          <\u002Flabel>`).join('')}\n        <\u002Fdiv>\n        ${em ? `<div class=\"add-criterion-row\">\n          <input type=\"text\" class=\"add-criterion-input\" id=\"add-crit-${m.id}\" placeholder=\"Add criterion...\" onkeydown=\"if(event.key==='Enter'){addCriterion('${p.id}','${m.id}');}\">\n          <button class=\"add-criterion-btn\" onclick=\"addCriterion('${p.id}','${m.id}')\">Add<\u002Fbutton>\n        <\u002Fdiv>` : ''}\n      <\u002Fdiv>`;\n    }).join('')}\n  <\u002Fdiv>`;\n}\n\nfunction renderGantt(p) {\n  const start=p.startDate, end=p.endDate, totalDays=daysBetween(start,end);\n  const months=[];\n  let cur=new Date(start.getFullYear(),start.getMonth(),1);\n  const ML=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  while(cur<=end){months.push(ML[cur.getMonth()]+'\\''+String(cur.getFullYear()).slice(2));cur.setMonth(cur.getMonth()+1);}\n  const todayPct=Math.max(0,Math.min(100,(daysBetween(start,NOW)/totalDays)*100)).toFixed(2);\n\n  function getRange(t) {\n    const ip=p.logs.filter(l=>l.description.startsWith(\"Task '\"+t.title+\"'\")&&l.description.includes('to IN_PROGRESS')).sort((a,b)=>a.timestamp-b.timestamp)[0];\n    const dn=p.logs.filter(l=>l.description.startsWith(\"Task '\"+t.title+\"'\")&&l.description.includes('to DONE')).sort((a,b)=>b.timestamp-a.timestamp)[0];\n    let s=t.startedAt||(ip?ip.timestamp:null)||(()=>{const d=new Date(t.dueDate);d.setDate(d.getDate()-(t.plannedEffortDays||5));return d;})();\n    let e=t.completedAt||(dn?dn.timestamp:null)||t.dueDate;\n    return {s,e};\n  }\n\n  let rows='';\n  for(const ws of [...p.workstreams].sort((a,b)=>a.order-b.order)){\n    rows+=`<div class=\"gantt-section-label\">${ws.name}<\u002Fdiv>`;\n    for(const t of p.tasks.filter(t=>t.workstreamId===ws.id)){\n      const {s,e}=getRange(t);\n      const lp=Math.max(0,(daysBetween(start,s)/totalDays)*100).toFixed(2);\n      const wp=Math.max(1,(Math.max(1,daysBetween(s,e))/totalDays)*100).toFixed(2);\n      rows+=`<div class=\"gantt-row\">\n        <div class=\"gantt-row-label\" title=\"${t.title}\">${t.title}<\u002Fdiv>\n        <div class=\"gantt-row-body\">\n          <div class=\"gantt-today\" style=\"left:${todayPct}%;\"><\u002Fdiv>\n          <div class=\"gantt-bar ${t.status}${t.isCriticalPath?' cp':''}\" style=\"left:${lp}%;width:${wp}%;\" title=\"${t.title}\">${t.status.replace('_',' ')}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }\n  }\n  rows+=`<div class=\"gantt-section-label\">Milestones<\u002Fdiv><div class=\"gantt-row\">\n    <div class=\"gantt-row-label\" style=\"color:#7c3aed;font-weight:700;\">Milestones<\u002Fdiv>\n    <div class=\"gantt-row-body\">\n      <div class=\"gantt-today\" style=\"left:${todayPct}%;\"><\u002Fdiv>\n      ${p.milestones.map(m=>{const lp=((daysBetween(start,m.targetDate)/totalDays)*100).toFixed(2);return`<div class=\"gantt-milestone\" style=\"left:calc(${lp}% - 6px);\" title=\"${m.title} — ${fmtDate(m.targetDate)}\"><\u002Fdiv>`;}).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n\n  return `<div class=\"card no-lift\">\n    <div class=\"card-header\"><div class=\"card-title\">Gantt<\u002Fdiv><\u002Fdiv>\n    <div class=\"gantt-container\"><div class=\"gantt-inner\">\n      <div class=\"gantt-header\">\n        <div class=\"gantt-task-label\">Task<\u002Fdiv>\n        <div class=\"gantt-months\" style=\"position:relative;\">\n          <div class=\"gantt-today\" style=\"left:${todayPct}%;\"><\u002Fdiv>\n          ${months.map(m=>`<div class=\"gantt-month\">${m}<\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      ${rows}\n    <\u002Fdiv><\u002Fdiv>\n    ${ganttLegend([['#cbd5e1','To Do'],['#3b82f6','In Progress'],['#ef4444','Blocked'],['#10b981','Done'],['#7c3aed','Milestone'],['#f59e0b','Critical Path']])}\n  <\u002Fdiv>`;\n}\n\n\n//================================================================\n// CREATE / EDIT FORMS\n//================================================================\nfunction renderCreateForm() {\n  const draft = STATE.createDraft;\n  const kind = STATE.createKind;\n  if (!draft || !kind) return renderOverview();\n  if (kind === 'project')         return renderCreateProject(draft);\n  if (kind === 'annualProcess')   return renderCreateAnnualOrEvent(draft, 'Annual Process', 'annualProcess');\n  if (kind === 'projectEvent')    return renderCreateAnnualOrEvent(draft, 'Project Event', 'projectEvent');\n  if (kind === 'cultureEvent')    return renderCreateDateBased(draft, 'Culture Event', 'cultureEvent');\n  if (kind === 'publicHoliday')   return renderCreateDateBased(draft, 'Public Holiday', 'publicHoliday');\n  return renderOverview();\n}\n\nfunction userOptionsHTML(selected, includeUnassigned) {\n  const users = Object.values(USERS).sort((a,b)=>a.name.localeCompare(b.name));\n  let opts = '';\n  if (includeUnassigned) opts += `<option value=\"\" ${!selected?'selected':''}>(unassigned)<\u002Foption>`;\n  return opts + users.map(u => `<option value=\"${u.id}\" ${selected===u.id?'selected':''}>${u.name}<\u002Foption>`).join('');\n}\n\nfunction renderCreateProject(d) {\n  const allProjects = STATE.projects.map(enrichProject);\n  const isEdit = !!d.__editingId;\n  const title = isEdit ? `Edit Project -- ${d.name || ''}` : 'New Project';\n  return `\n    <div class=\"layout\">\n      ${renderSidebar(allProjects)}\n      <main class=\"main\">\n        <div class=\"topbar\">\n          <div class=\"breadcrumb\"><a onclick=\"navigateToOverview()\">Overview<\u002Fa> / ${title}<\u002Fdiv>\n          <div class=\"topbar-right\"><span>${fmtDateLong(NOW)}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">${isEdit ? 'Project Details' : 'New Project'}<\u002Fdiv>\n          <div class=\"form-section-sub\">Define scope, ownership, priority, and the rough date window. Workstreams, tasks, milestones, and criteria are added below.<\u002Fdiv>\n          <div class=\"form-grid cols-2\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Project Name<\u002Flabel>\n              ${isEdit\n                ? `<div class=\"form-input\" style=\"background:#f8faff;color:#64748b;cursor:not-allowed;\" title=\"Project name cannot be changed after creation\">${escapeHtml(d.name||'')}<\u002Fdiv>`\n                : `<input type=\"text\" class=\"form-input\" id=\"cp-name\" value=\"${escapeHtml(d.name||'')}\" placeholder=\"e.g. Project Phoenix\" oninput=\"updateDraft('name',this.value)\">`\n              }\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Category<\u002Flabel>\n              <input type=\"text\" class=\"form-input\" id=\"cp-cat\" value=\"${escapeHtml(d.category||'')}\" placeholder=\"e.g. Operational Excellence\" oninput=\"updateDraft('category',this.value)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-1\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Notion Page Link <span style=\"color:#94a3b8;font-weight:500;font-size:11px;\">(optional)<\u002Fspan><\u002Flabel>\n              <input type=\"url\" class=\"form-input\" value=\"${escapeHtml(d.notionUrl||'')}\" placeholder=\"https://notion.so/...\" oninput=\"updateDraft('notionUrl',this.value)\" style=\"font-size:12px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-1\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Description<\u002Flabel>\n              <textarea class=\"form-textarea\" id=\"cp-desc\" oninput=\"updateDraft('description',this.value)\" placeholder=\"What does success look like? What problem is this solving?\">${escapeHtml(d.description||'')}<\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-4\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Owner<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('ownerId',this.value)\">${userOptionsHTML(d.ownerId, true)}<\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Priority Rating<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('priorityRating',this.value)\">\n                ${['P1','P2','P3','P4'].map(p=>`<option value=\"${p}\" ${d.priorityRating===p?'selected':''}>${p}<\u002Foption>`).join('')}\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Start Date<\u002Flabel>\n              ${isEdit\n                ? `<div class=\"form-input\" style=\"background:#f8faff;color:#64748b;cursor:not-allowed;\" title=\"Start date cannot be changed after creation\">${dateInputVal(d.startDate)}<\u002Fdiv>`\n                : `<input type=\"date\" class=\"form-input\" value=\"${dateInputVal(d.startDate)}\" onchange=\"updateDraft('startDate',new Date(this.value))\">`\n              }\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">End Date<\u002Flabel>\n              ${isEdit\n                ? `<div class=\"form-input\" style=\"background:#f8faff;color:#64748b;cursor:not-allowed;\" title=\"End date cannot be changed after creation\">${dateInputVal(d.endDate)}<\u002Fdiv>`\n                : `<input type=\"date\" class=\"form-input\" value=\"${dateInputVal(d.endDate)}\" onchange=\"updateDraft('endDate',new Date(this.value))\">`\n              }\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-4\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Strategic Fit (1-5)<\u002Flabel>\n              <input type=\"number\" min=\"1\" max=\"5\" class=\"form-input\" value=\"${d.strategicFit||3}\" onchange=\"updateDraft('strategicFit',parseInt(this.value)||3)\">\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Impact (1-5)<\u002Flabel>\n              <input type=\"number\" min=\"1\" max=\"5\" class=\"form-input\" value=\"${d.impact||3}\" onchange=\"updateDraft('impact',parseInt(this.value)||3)\">\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Urgency (1-5)<\u002Flabel>\n              <input type=\"number\" min=\"1\" max=\"5\" class=\"form-input\" value=\"${d.urgency||3}\" onchange=\"updateDraft('urgency',parseInt(this.value)||3)\">\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Complexity (1-5)<\u002Flabel>\n              <input type=\"number\" min=\"1\" max=\"5\" class=\"form-input\" value=\"${d.complexity||3}\" onchange=\"updateDraft('complexity',parseInt(this.value)||3)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">Workstreams<\u002Fdiv>\n          <div class=\"form-section-sub\">Group related tasks. Each task must be assigned to a workstream.<\u002Fdiv>\n          <div class=\"inline-item-list\">\n            ${(d.workstreams||[]).map((ws,idx)=>`\n              <div class=\"inline-item\">\n                <div class=\"inline-item-row ws-row\">\n                  <input type=\"text\" class=\"form-input\" placeholder=\"Workstream name\" value=\"${escapeHtml(ws.name)}\" onchange=\"updateDraftWorkstream(${idx},'name',this.value)\">\n                  <select class=\"form-select\" onchange=\"updateDraftWorkstream(${idx},'ownerId',this.value)\">${userOptionsHTML(ws.ownerId, true)}<\u002Fselect>\n                  <button class=\"inline-remove-btn\" onclick=\"removeDraftWorkstream(${idx})\" title=\"Remove\">&times;<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            `).join('')}\n          <\u002Fdiv>\n          <button class=\"add-inline-btn\" onclick=\"addDraftWorkstream()\">+ Add workstream<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">Tasks<\u002Fdiv>\n          <div class=\"form-section-sub\">Add tasks with workstream, owner, planned effort (working days), and due date. Critical-path tasks are highlighted on the project Gantt.<\u002Fdiv>\n          ${(d.tasks||[]).length > 0 ? `\n          <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 0.8fr 0.8fr 0.8fr 36px;gap:8px;padding:0 2px 6px;border-bottom:1px solid #f1f5f9;margin-bottom:8px;\">\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;\">Task Title<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;\">Workstream<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;\">Owner<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;\">Days to Execute<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;\">Date Scheduled to Start<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;text-align:center;\">Critical Path<\u002Fdiv>\n            <div><\u002Fdiv>\n          <\u002Fdiv>` : ''}\n          <div class=\"inline-item-list\">\n            ${(d.tasks||[]).map((t,idx)=>`\n              <div class=\"inline-item\">\n                <div class=\"inline-item-row task-row-edit\">\n                  <input type=\"text\" class=\"form-input\" placeholder=\"Task title\" value=\"${escapeHtml(t.title)}\" onchange=\"updateDraftTask(${idx},'title',this.value)\">\n                  <select class=\"form-select\" onchange=\"updateDraftTask(${idx},'workstreamId',this.value)\">\n                    <option value=\"\">(workstream)<\u002Foption>\n                    ${(d.workstreams||[]).map(ws=>`<option value=\"${ws.id}\" ${t.workstreamId===ws.id?'selected':''}>${escapeHtml(ws.name||'(unnamed)')}<\u002Foption>`).join('')}\n                  <\u002Fselect>\n                  <select class=\"form-select\" onchange=\"updateDraftTask(${idx},'ownerId',this.value)\">${userOptionsHTML(t.ownerId, true)}<\u002Fselect>\n                  <input type=\"number\" min=\"1\" class=\"form-input\" placeholder=\"e.g. 5\" value=\"${t.plannedEffortDays||''}\" onchange=\"updateDraftTask(${idx},'plannedEffortDays',parseInt(this.value)||null)\" title=\"Working days planned to execute this task\">\n                  <input type=\"date\" class=\"form-input\" value=\"${dateInputVal(t.dueDate)}\" onchange=\"updateDraftTask(${idx},'dueDate',new Date(this.value))\">\n                  <label style=\"display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:700;color:#64748b;\" title=\"Mark as critical path — highlighted on Gantt\"><input type=\"checkbox\" ${t.isCriticalPath?'checked':''} onchange=\"updateDraftTask(${idx},'isCriticalPath',this.checked)\">CP<\u002Flabel>\n                  <button class=\"inline-remove-btn\" onclick=\"removeDraftTask(${idx})\" title=\"Remove\">&times;<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            `).join('')}\n          <\u002Fdiv>\n          <button class=\"add-inline-btn\" onclick=\"addDraftTask()\">+ Add task<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">Milestones &amp; Criteria<\u002Fdiv>\n          <div class=\"form-section-sub\">Each milestone has a target date and weight. Criteria are the checklist items that must be ticked for the milestone to be considered complete.<\u002Fdiv>\n          <div class=\"inline-item-list\">\n            ${(d.milestones||[]).map((m,idx)=>`\n              <div class=\"inline-item\">\n                <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr 36px;gap:8px;margin-bottom:4px;\">\n                  <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.1px;text-transform:uppercase;\">Milestone Title<\u002Fdiv>\n                  <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.1px;text-transform:uppercase;\">Quarter<\u002Fdiv>\n                  <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.1px;text-transform:uppercase;\">Scheduled to Complete By<\u002Fdiv>\n                  <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.1px;text-transform:uppercase;\">Weight of Milestone<\u002Fdiv>\n                  <div><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"inline-item-row\" style=\"grid-template-columns:2fr 1fr 1fr 1fr 36px;\">\n                  <input type=\"text\" class=\"form-input\" placeholder=\"Milestone title\" value=\"${escapeHtml(m.title)}\" onchange=\"updateDraftMilestone(${idx},'title',this.value)\">\n                  <select class=\"form-select\" onchange=\"updateDraftMilestone(${idx},'targetQuarter',this.value)\">\n                    ${['Q1 2026','Q2 2026','Q3 2026','Q4 2026','Q1 2027','Q2 2027','Q3 2027','Q4 2027'].map(q=>`<option value=\"${q}\" ${(m.targetQuarter||'')=== q?'selected':''}>${q}<\u002Foption>`).join('')}\n                  <\u002Fselect>\n                  <input type=\"date\" class=\"form-input\" value=\"${dateInputVal(m.targetDate)}\" onchange=\"updateDraftMilestone(${idx},'targetDate',new Date(this.value))\" title=\"Scheduled completion date\">\n                  <div class=\"star-rating\" title=\"Weight of this milestone (1 = low, 5 = high). Affects overall milestone progress score.\">\n                    ${[1,2,3,4,5].map(n=>`<span onclick=\"updateDraftMilestone(${idx},'weight',${n});render()\" style=\"color:${(m.weight||1)>=n?'#f59e0b':'#d1d5db'};\">★<\u002Fspan>`).join('')}\n                  <\u002Fdiv>\n                  <button class=\"inline-remove-btn\" onclick=\"removeDraftMilestone(${idx})\" title=\"Remove\">&times;<\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"criteria-edit-list\">\n                  <div style=\"font-size:9px;font-weight:800;color:#94a3b8;letter-spacing:1.2px;text-transform:uppercase;padding:10px 0 6px;border-top:1px solid #f1f5f9;margin-top:10px;\">Acceptance Criteria<\u002Fdiv>\n                  ${(m.criteria||[]).map((c,cidx)=>`\n                    <div class=\"inline-item-row criterion-row\" style=\"margin-top:6px;\">\n                      <input type=\"text\" class=\"form-input\" placeholder=\"Criterion text\" value=\"${escapeHtml(c.text)}\" onchange=\"updateDraftCriterion(${idx},${cidx},'text',this.value)\">\n                      <button class=\"inline-remove-btn\" onclick=\"removeDraftCriterion(${idx},${cidx})\" title=\"Remove\">&times;<\u002Fbutton>\n                    <\u002Fdiv>\n                  `).join('')}\n                  <button class=\"add-inline-btn\" style=\"margin-top:6px;font-size:11px;padding:6px 10px;\" onclick=\"addDraftCriterion(${idx})\">+ Criterion<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            `).join('')}\n          <\u002Fdiv>\n          <button class=\"add-inline-btn\" onclick=\"addDraftMilestone()\">+ Add milestone<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"form-actions\" style=\"background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px 26px;margin-top:18px;box-shadow:0 2px 8px rgba(0,0,80,0.06);\">\n          <button class=\"btn secondary\" onclick=\"cancelCreate()\">Cancel<\u002Fbutton>\n          <button class=\"btn primary\" onclick=\"commitCreate()\">${isEdit ? 'Save changes' : 'Create project'}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>`;\n}\n\nfunction renderCreateAnnualOrEvent(d, label, kind) {\n  const allProjects = STATE.projects.map(enrichProject);\n  const isEdit = !!d.__editingId;\n  return `\n    <div class=\"layout\">\n      ${renderSidebar(allProjects)}\n      <main class=\"main\">\n        <div class=\"topbar\">\n          <div class=\"breadcrumb\"><a onclick=\"navigateToOverview()\">Overview<\u002Fa> / ${isEdit ? `Edit ${label}` : `New ${label}`}<\u002Fdiv>\n          <div class=\"topbar-right\"><span>${fmtDateLong(NOW)}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">${isEdit ? `Edit ${label}` : `New ${label}`}<\u002Fdiv>\n          <div class=\"form-section-sub\">${kind==='annualProcess' ? 'Recurring HR cycles such as performance calibration or bonus payout.' : 'Discrete people-team initiatives with a clear beginning and end (e.g. People Tour, eNPS Survey).'}<\u002Fdiv>\n\n          <div class=\"form-grid cols-2\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Name<\u002Flabel>\n              <input type=\"text\" class=\"form-input\" value=\"${escapeHtml(d.name||'')}\" oninput=\"updateDraft('name',this.value)\" placeholder=\"${kind==='annualProcess'?'e.g. Performance Calibration':'e.g. People Tour'}\">\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Owner<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('ownerId',this.value)\">${userOptionsHTML(d.ownerId, true)}<\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-3\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Start Month<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('startMonth',parseInt(this.value))\">\n                ${MONTH_NAMES.map((m,i)=>`<option value=\"${i+1}\" ${d.startMonth===i+1?'selected':''}>${m}<\u002Foption>`).join('')}\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">End Month<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('endMonth',parseInt(this.value))\">\n                ${MONTH_NAMES.map((m,i)=>`<option value=\"${i+1}\" ${d.endMonth===i+1?'selected':''}>${m}<\u002Foption>`).join('')}\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Status<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('status',this.value)\">\n                <option value=\"ON_TRACK\"  ${d.status==='ON_TRACK'?'selected':''}>On Track<\u002Foption>\n                <option value=\"AT_RISK\"   ${d.status==='AT_RISK'?'selected':''}>At Risk<\u002Foption>\n                <option value=\"OFF_TRACK\" ${d.status==='OFF_TRACK'?'selected':''}>Off Track<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-1\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Description<\u002Flabel>\n              <textarea class=\"form-textarea\" oninput=\"updateDraft('description',this.value)\" placeholder=\"What does this cover?\">${escapeHtml(d.description||'')}<\u002Ftextarea>\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Notes (optional)<\u002Flabel>\n              <textarea class=\"form-textarea\" oninput=\"updateDraft('note',this.value)\" placeholder=\"Risks, blockers, context\">${escapeHtml(d.note||'')}<\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">Phases<\u002Fdiv>\n          <div class=\"form-section-sub\">Sequential stages. Set status as the phase progresses.<\u002Fdiv>\n          <div class=\"inline-item-list\">\n            ${(d.phases||[]).map((ph,idx)=>`\n              <div class=\"inline-item\">\n                <div class=\"inline-item-row\" style=\"grid-template-columns:2fr 1fr 1fr 36px;\">\n                  <input type=\"text\" class=\"form-input\" placeholder=\"Phase name\" value=\"${escapeHtml(ph.name)}\" onchange=\"updateDraftPhase(${idx},'name',this.value)\">\n                  <input type=\"text\" class=\"form-input\" placeholder=\"Window (e.g. Mar 1-15)\" value=\"${escapeHtml(ph.month||'')}\" onchange=\"updateDraftPhase(${idx},'month',this.value)\">\n                  <select class=\"form-select\" onchange=\"updateDraftPhase(${idx},'status',this.value)\">\n                    <option value=\"TO_DO\"       ${ph.status==='TO_DO'?'selected':''}>TO DO<\u002Foption>\n                    <option value=\"IN_PROGRESS\" ${ph.status==='IN_PROGRESS'?'selected':''}>IN PROGRESS<\u002Foption>\n                    <option value=\"DONE\"        ${ph.status==='DONE'?'selected':''}>DONE<\u002Foption>\n                  <\u002Fselect>\n                  <button class=\"inline-remove-btn\" onclick=\"removeDraftPhase(${idx})\" title=\"Remove\">&times;<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            `).join('')}\n          <\u002Fdiv>\n          <button class=\"add-inline-btn\" onclick=\"addDraftPhase()\">+ Add phase<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"form-actions\" style=\"background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px 26px;margin-top:18px;box-shadow:0 2px 8px rgba(0,0,80,0.06);\">\n          <button class=\"btn secondary\" onclick=\"cancelCreate()\">Cancel<\u002Fbutton>\n          <button class=\"btn primary\" onclick=\"commitCreate()\">${isEdit ? 'Save changes' : `Create ${label}`}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>`;\n}\n\nfunction renderCreateDateBased(d, label, kind) {\n  const allProjects = STATE.projects.map(enrichProject);\n  return `\n    <div class=\"layout\">\n      ${renderSidebar(allProjects)}\n      <main class=\"main\">\n        <div class=\"topbar\">\n          <div class=\"breadcrumb\"><a onclick=\"navigateToOverview()\">Overview<\u002Fa> / New ${label}<\u002Fdiv>\n          <div class=\"topbar-right\"><span>${fmtDateLong(NOW)}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-section\">\n          <div class=\"form-section-title\">New ${label}<\u002Fdiv>\n          <div class=\"form-section-sub\">${kind==='cultureEvent' ? 'A specific celebration or recognition moment.' : 'A statutory non-working day.'}<\u002Fdiv>\n          <div class=\"form-grid cols-2\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Name<\u002Flabel>\n              <input type=\"text\" class=\"form-input\" value=\"${escapeHtml(d.name||'')}\" oninput=\"updateDraft('name',this.value)\">\n            <\u002Fdiv>\n            <div class=\"form-field\">\n              <label class=\"form-label\">Country / Region<\u002Flabel>\n              <input type=\"text\" class=\"form-input\" value=\"${escapeHtml(d.country||'')}\" oninput=\"updateDraft('country',this.value)\" placeholder=\"e.g. Malaysia, Regional, MY/SG\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-grid cols-2\" style=\"margin-top:14px;\">\n            <div class=\"form-field\">\n              <label class=\"form-label\">Date<\u002Flabel>\n              <input type=\"date\" class=\"form-input\" value=\"${dateInputVal(d.date)}\" onchange=\"updateDraft('date',new Date(this.value))\">\n            <\u002Fdiv>\n            ${kind==='cultureEvent' ? `<div class=\"form-field\">\n              <label class=\"form-label\">Owner (optional)<\u002Flabel>\n              <select class=\"form-select\" onchange=\"updateDraft('ownerId',this.value)\">${userOptionsHTML(d.ownerId, true)}<\u002Fselect>\n            <\u002Fdiv>` : ''}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-actions\" style=\"background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px 26px;margin-top:18px;box-shadow:0 2px 8px rgba(0,0,80,0.06);\">\n          <button class=\"btn secondary\" onclick=\"cancelCreate()\">Cancel<\u002Fbutton>\n          <button class=\"btn primary\" onclick=\"commitCreate()\">Create<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>`;\n}\n\n// Helpers for draft manipulation\nfunction escapeHtml(s) {\n  if (s == null) return '';\n  return String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;');\n}\nfunction dateInputVal(d) {\n  if (!d) return '';\n  const dt = d instanceof Date ? d : new Date(d);\n  if (isNaN(dt)) return '';\n  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');\n}\n\nfunction startCreate(kind, prefill) {\n  closeCreateMenu();\n  STATE.createKind = kind;\n  STATE.view = 'create';\n  STATE.selectedProjectId = null; STATE.selectedProcessId = null; STATE.selectedEventId = null;\n  if (prefill) {\n    STATE.createDraft = prefill;\n  } else if (kind === 'project') {\n    STATE.createDraft = {\n      id: uid('p'), code: '', name: '', category: '', description: '',\n      ownerId: 'muqriz',\n      strategicFit: 3, impact: 3, urgency: 3, complexity: 3, priorityRating: 'P2',\n      startDate: new Date(), endDate: new Date(NOW.getFullYear(), NOW.getMonth()+3, NOW.getDate()),\n      workstreams: [], milestones: [], tasks: [], logs: []\n    };\n  } else if (kind === 'annualProcess' || kind === 'projectEvent') {\n    STATE.createDraft = {\n      id: uid(kind==='annualProcess'?'ap':'ev'),\n      name: '', ownerId: 'muqriz', startMonth: NOW.getMonth()+1, endMonth: NOW.getMonth()+2,\n      status: 'ON_TRACK', description: '', note: '',\n      phases: []\n    };\n  } else if (kind === 'cultureEvent') {\n    STATE.createDraft = { id: uid('ce'), name: '', country: '', date: new Date(), ownerId: '' };\n  } else if (kind === 'publicHoliday') {\n    STATE.createDraft = { id: uid('ph'), name: '', country: '', date: new Date() };\n  }\n  render();\n  window.scrollTo(0,0);\n}\n\nfunction cancelCreate() {\n  STATE.createDraft = null; STATE.createKind = null;\n  navigateToOverview();\n}\n\nfunction updateDraft(field, value) { STATE.createDraft[field] = value; }\n\nfunction updateDraftWorkstream(idx, field, value) {\n  STATE.createDraft.workstreams[idx][field] = value;\n  saveState();\n}\nfunction addDraftWorkstream() {\n  const ws = STATE.createDraft.workstreams || (STATE.createDraft.workstreams=[]);\n  ws.push({ id: uid('ws'), name: '', ownerId: '', order: ws.length });\n  render();\n}\nfunction removeDraftWorkstream(idx) {\n  const wsId = STATE.createDraft.workstreams[idx].id;\n  STATE.createDraft.workstreams.splice(idx, 1);\n  // Unlink tasks pointing to this workstream\n  (STATE.createDraft.tasks||[]).forEach(t => { if (t.workstreamId === wsId) t.workstreamId = ''; });\n  render();\n}\n\nfunction addDraftTask() {\n  const tasks = STATE.createDraft.tasks || (STATE.createDraft.tasks=[]);\n  tasks.push({ id: uid('t'), title: '', status: 'TO_DO', ownerId: '', workstreamId: '', plannedEffortDays: 5, dueDate: new Date(NOW.getFullYear(), NOW.getMonth()+1, NOW.getDate()), isCriticalPath: false });\n  render();\n}\nfunction updateDraftTask(idx, field, value) {\n  STATE.createDraft.tasks[idx][field] = value;\n}\nfunction removeDraftTask(idx) {\n  STATE.createDraft.tasks.splice(idx, 1);\n  render();\n}\n\nfunction addDraftMilestone() {\n  const ms = STATE.createDraft.milestones || (STATE.createDraft.milestones=[]);\n  ms.push({ id: uid('m'), title: '', targetQuarter: '', targetDate: new Date(NOW.getFullYear(), NOW.getMonth()+2, 28), weight: 1, order: ms.length, criteria: [] });\n  render();\n}\nfunction updateDraftMilestone(idx, field, value) {\n  STATE.createDraft.milestones[idx][field] = value;\n}\nfunction removeDraftMilestone(idx) {\n  STATE.createDraft.milestones.splice(idx, 1);\n  render();\n}\nfunction addDraftCriterion(midx) {\n  const m = STATE.createDraft.milestones[midx];\n  m.criteria.push({ id: uid('c'), text: '', completed: false, order: m.criteria.length });\n  render();\n}\nfunction updateDraftCriterion(midx, cidx, field, value) {\n  STATE.createDraft.milestones[midx].criteria[cidx][field] = value;\n}\nfunction removeDraftCriterion(midx, cidx) {\n  STATE.createDraft.milestones[midx].criteria.splice(cidx, 1);\n  render();\n}\n\nfunction addDraftPhase() {\n  const ph = STATE.createDraft.phases || (STATE.createDraft.phases=[]);\n  ph.push({ name: '', month: '', status: 'TO_DO' });\n  render();\n}\nfunction updateDraftPhase(idx, field, value) {\n  STATE.createDraft.phases[idx][field] = value;\n}\nfunction removeDraftPhase(idx) {\n  STATE.createDraft.phases.splice(idx, 1);\n  render();\n}\n\nfunction commitCreate() {\n  const d = STATE.createDraft, kind = STATE.createKind;\n  if (!d) return;\n  if (!d.name || !String(d.name).trim()) { alert('Name is required.'); return; }\n\n  if (kind === 'project') {\n    // Light validation\n    if (!d.startDate || !d.endDate || isNaN(new Date(d.startDate)) || isNaN(new Date(d.endDate))) {\n      alert('Project requires valid start and end dates.'); return;\n    }\n    if (!d.code) d.code = (d.name||'P').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3) + '-' + Math.floor(Math.random()*900+100);\n    // Filter out empty workstreams/tasks/milestones/criteria\n    d.workstreams = (d.workstreams||[]).filter(w => (w.name||'').trim());\n    d.tasks = (d.tasks||[]).filter(t => (t.title||'').trim());\n    d.milestones = (d.milestones||[]).map(m => ({ ...m, criteria: (m.criteria||[]).filter(c => (c.text||'').trim()) }))\n                                     .filter(m => (m.title||'').trim());\n    if (d.__editingId) {\n      // Replace existing project but keep its logs\n      const existing = STATE.projects.find(p => p.id === d.__editingId);\n      if (existing) {\n        const keepLogs = existing.logs;\n        const newProj = { ...d, id: d.__editingId, logs: keepLogs };\n        delete newProj.__editingId;\n        const idx = STATE.projects.findIndex(p => p.id === d.__editingId);\n        STATE.projects[idx] = newProj;\n        writeLog(STATE.projects[idx], 'MANUAL', `Project metadata edited (workstreams/tasks/milestones updated).`, newProj.ownerId || 'muqriz');\n      }\n    } else {\n      d.logs = [{ id: uid('l'), timestamp: new Date(), type: 'MANUAL', description: `Project ${d.name} created.`, userId: d.ownerId || 'muqriz' }];\n      STATE.projects.push(d);\n    }\n    saveState();\n    STATE.createDraft = null; STATE.createKind = null;\n    navigateToProject(d.id || d.__editingId);\n    return;\n  }\n\n  if (kind === 'annualProcess') {\n    if (d.__editingId) {\n      const idx = annualProcesses.findIndex(a => a.id === d.__editingId);\n      if (idx >= 0) { const obj = { ...d, id: d.__editingId }; delete obj.__editingId; annualProcesses[idx] = obj; }\n    } else {\n      annualProcesses.push(d);\n    }\n    saveState(); STATE.createDraft = null; STATE.createKind = null;\n    navigateToProcess(d.id || d.__editingId);\n    return;\n  }\n\n  if (kind === 'projectEvent') {\n    if (d.__editingId) {\n      const idx = projectEvents.findIndex(a => a.id === d.__editingId);\n      if (idx >= 0) { const obj = { ...d, id: d.__editingId }; delete obj.__editingId; projectEvents[idx] = obj; }\n    } else {\n      projectEvents.push(d);\n    }\n    saveState(); STATE.createDraft = null; STATE.createKind = null;\n    navigateToEvent(d.id || d.__editingId);\n    return;\n  }\n\n  if (kind === 'cultureEvent') {\n    cultureEvents.push(d); saveState();\n    STATE.createDraft = null; STATE.createKind = null;\n    navigateToOverview();\n    return;\n  }\n\n  if (kind === 'publicHoliday') {\n    publicHolidays.push(d); saveState();\n    STATE.createDraft = null; STATE.createKind = null;\n    navigateToOverview();\n    return;\n  }\n}\n\n//================================================================\n// EDIT EXISTING ITEMS\n//================================================================\nfunction openEditProject(projectId) {\n  const p = getProject(projectId);\n  if (!p) return;\n  // Deep clone with Date preservation: walk tree, then revive.\n  function wrap(o) {\n    if (o === null || o === undefined) return o;\n    if (o instanceof Date) return { __date: o.toISOString() };\n    if (Array.isArray(o)) return o.map(wrap);\n    if (typeof o === 'object') { const out = {}; for (const k of Object.keys(o)) out[k] = wrap(o[k]); return out; }\n    return o;\n  }\n  STATE.createKind = 'project';\n  STATE.createDraft = reviveDates(JSON.parse(JSON.stringify(wrap(p))));\n  STATE.createDraft.__editingId = p.id;\n  STATE.view = 'create';\n  render(); window.scrollTo(0,0);\n}\n\nfunction openEditAnnualProcess(id) {\n  const ap = getProcess(id); if (!ap) return;\n  STATE.createKind = 'annualProcess';\n  STATE.createDraft = { ...JSON.parse(JSON.stringify(ap)), __editingId: ap.id };\n  STATE.view = 'create';\n  render(); window.scrollTo(0,0);\n}\n\nfunction openEditProjectEvent(id) {\n  const ev = getEvent(id); if (!ev) return;\n  STATE.createKind = 'projectEvent';\n  STATE.createDraft = { ...JSON.parse(JSON.stringify(ev)), __editingId: ev.id };\n  STATE.view = 'create';\n  render(); window.scrollTo(0,0);\n}\n\nfunction removeProject(id) {\n  const p = getProject(id); if (!p) return;\n  if (!confirm(`Delete project \"${projectDisplayName(p)}\"? This cannot be undone.`)) return;\n  STATE.projects = STATE.projects.filter(x => x.id !== id);\n  saveState();\n  navigateToOverview();\n}\n\nfunction removeAnnualProcess(id) {\n  const ap = getProcess(id); if (!ap) return;\n  if (!confirm(`Delete annual process \"${ap.name}\"? This cannot be undone.`)) return;\n  annualProcesses = annualProcesses.filter(x => x.id !== id);\n  saveState();\n  navigateToOverview();\n}\n\nfunction removeProjectEvent(id) {\n  const ev = getEvent(id); if (!ev) return;\n  if (!confirm(`Delete project event \"${ev.name}\"? This cannot be undone.`)) return;\n  projectEvents = projectEvents.filter(x => x.id !== id);\n  saveState();\n  navigateToOverview();\n}\n\nfunction removeCultureEvent(id) {\n  const c = cultureEvents.find(x => x.id === id); if (!c) return;\n  if (!confirm(`Remove culture event \"${c.name}\"?`)) return;\n  cultureEvents = cultureEvents.filter(x => x.id !== id);\n  saveState(); render();\n}\n\nfunction removePublicHoliday(id) {\n  const h = publicHolidays.find(x => x.id === id); if (!h) return;\n  if (!confirm(`Remove public holiday \"${h.name}\"?`)) return;\n  publicHolidays = publicHolidays.filter(x => x.id !== id);\n  saveState(); render();\n}\n\n//================================================================\n// INLINE EDITS ON PROJECT DETAIL\n//================================================================\nfunction addWorkstream(projectId) {\n  const p = getProject(projectId); if (!p) return;\n  const name = prompt('Workstream name:'); if (!name || !name.trim()) return;\n  const ownerId = p.ownerId || null;\n  p.workstreams.push({ id: uid('ws'), name: name.trim(), ownerId, order: p.workstreams.length });\n  writeLog(p, 'MANUAL', `Workstream \"${name.trim()}\" added.`, p.ownerId);\n  saveState(); render();\n}\n\nfunction removeWorkstream(projectId, wsId) {\n  const p = getProject(projectId); if (!p) return;\n  const ws = p.workstreams.find(w => w.id === wsId); if (!ws) return;\n  const taskCount = p.tasks.filter(t => t.workstreamId === wsId).length;\n  const msg = taskCount > 0\n    ? `Remove workstream \"${ws.name}\" and its ${taskCount} task${taskCount===1?'':'s'}? This cannot be undone.`\n    : `Remove workstream \"${ws.name}\"?`;\n  if (!confirm(msg)) return;\n  p.workstreams = p.workstreams.filter(w => w.id !== wsId);\n  p.tasks = p.tasks.filter(t => t.workstreamId !== wsId);\n  writeLog(p, 'MANUAL', `Workstream \"${ws.name}\" removed${taskCount>0?` along with ${taskCount} task(s)`:''}.`, p.ownerId);\n  saveState(); render();\n}\n\nfunction addTask(projectId, wsId) {\n  const p = getProject(projectId); if (!p) return;\n  const input = document.getElementById('add-task-' + wsId);\n  if (!input) return;\n  const title = input.value.trim();\n  if (!title) return;\n  const dueDate = new Date(NOW.getFullYear(), NOW.getMonth()+1, NOW.getDate());\n  p.tasks.push({ id: uid('t'), title, status: 'TO_DO', ownerId: p.ownerId || null, workstreamId: wsId, plannedEffortDays: 5, dueDate, isCriticalPath: false });\n  writeLog(p, 'MANUAL', `Task \"${title}\" added.`, p.ownerId);\n  saveState(); render();\n}\n\nfunction removeTask(projectId, taskId) {\n  const p = getProject(projectId); if (!p) return;\n  const t = p.tasks.find(x => x.id === taskId); if (!t) return;\n  if (!confirm(`Delete task \"${t.title}\"?`)) return;\n  p.tasks = p.tasks.filter(x => x.id !== taskId);\n  writeLog(p, 'MANUAL', `Task \"${t.title}\" deleted.`, p.ownerId);\n  if (STATE.expandedTaskId === taskId) STATE.expandedTaskId = null;\n  saveState(); render();\n}\n\nfunction addMilestone(projectId) {\n  const p = getProject(projectId); if (!p) return;\n  const title = prompt('Milestone title:'); if (!title || !title.trim()) return;\n  const defaultDateStr = dateInputVal(p.endDate || new Date(NOW.getFullYear(), NOW.getMonth()+2, 28));\n  const dateStr = prompt('Target date (YYYY-MM-DD):', defaultDateStr);\n  let targetDate = dateStr ? new Date(dateStr) : null;\n  if (!targetDate || isNaN(targetDate)) {\n    // Default to project end date if user input is invalid\n    targetDate = p.endDate ? new Date(p.endDate) : new Date(NOW.getFullYear(), NOW.getMonth()+2, 28);\n  }\n  const tq = `Q${Math.ceil((targetDate.getMonth()+1)/3)} ${targetDate.getFullYear()}`;\n  p.milestones.push({ id: uid('m'), title: title.trim(), targetQuarter: tq, targetDate, weight: 1, order: p.milestones.length, criteria: [] });\n  writeLog(p, 'MANUAL', `Milestone \"${title.trim()}\" added.`, p.ownerId);\n  saveState(); render();\n}\n\nfunction removeMilestone(projectId, mId) {\n  const p = getProject(projectId); if (!p) return;\n  const m = p.milestones.find(x => x.id === mId); if (!m) return;\n  if (!confirm(`Remove milestone \"${m.title}\" and its ${m.criteria.length} criteri${m.criteria.length===1?'on':'a'}?`)) return;\n  p.milestones = p.milestones.filter(x => x.id !== mId);\n  writeLog(p, 'MANUAL', `Milestone \"${m.title}\" removed.`, p.ownerId);\n  saveState(); render();\n}\n\nfunction addCriterion(projectId, mId) {\n  const p = getProject(projectId); if (!p) return;\n  const m = p.milestones.find(x => x.id === mId); if (!m) return;\n  const input = document.getElementById('add-crit-' + mId);\n  if (!input) return;\n  const text = input.value.trim();\n  if (!text) return;\n  m.criteria.push({ id: uid('c'), text, completed: false, order: m.criteria.length });\n  writeLog(p, 'MANUAL', `Criterion \"${text}\" added under \"${m.title}\".`, p.ownerId);\n  saveState(); render();\n}\n\nfunction removeCriterion(projectId, mId, cId) {\n  const p = getProject(projectId); if (!p) return;\n  const m = p.milestones.find(x => x.id === mId); if (!m) return;\n  const c = m.criteria.find(x => x.id === cId); if (!c) return;\n  if (!confirm(`Remove criterion \"${c.text}\"?`)) return;\n  m.criteria = m.criteria.filter(x => x.id !== cId);\n  writeLog(p, 'MANUAL', `Criterion \"${c.text}\" removed from \"${m.title}\".`, p.ownerId);\n  saveState(); render();\n}\n\n//================================================================\n// HANDLERS\n//================================================================\nfunction writeLog(project, type, description, userId) {\n  project.logs.unshift({ id:'log-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), timestamp:new Date(), type, description, userId:userId||project.ownerId });\n}\nfunction handleStatusChange(projectId, taskId, newStatus, event) {\n  const p=getProject(projectId), t=p.tasks.find(x=>x.id===taskId);\n  if (!t||t.status===newStatus) return;\n  STATE.modal={kind:'STATUS_CHANGE',projectId,taskId,taskTitle:t.title,oldStatus:t.status,newStatus};\n  render();\n}\nfunction confirmStatusChange() {\n  const m=STATE.modal; if (!m||m.kind!=='STATUS_CHANGE') return;\n  const p=getProject(m.projectId), t=p.tasks.find(x=>x.id===m.taskId);\n  if (!t){STATE.modal=null;render();return;}\n  const os=t.status, ns=m.newStatus;\n  t.status=ns;\n  if (ns==='IN_PROGRESS'&&!t.startedAt) t.startedAt=new Date();\n  if (ns==='DONE'){if (!t.startedAt) t.startedAt=new Date();t.completedAt=new Date();}\n  if (os==='DONE'&&ns!=='DONE') t.completedAt=null;\n  writeLog(p,'TASK_STATUS',\"Task '\"+t.title+\"' moved from \"+os+\" to \"+ns,t.ownerId);\n  if (ns==='BLOCKED') writeLog(p,'TASK_BLOCKED',\"Task '\"+t.title+\"' is BLOCKED\",t.ownerId);\n  if (os==='BLOCKED'&&ns!=='BLOCKED') writeLog(p,'TASK_UNBLOCKED',\"Task '\"+t.title+\"' is UNBLOCKED\",t.ownerId);\n  STATE.modal=null; saveState(); render();\n}\nfunction cancelStatusChange(){STATE.modal=null;render();}\nfunction handleTaskRowClick(event,taskId){\n  const tag=(event.target.tagName||'').toLowerCase();\n  if(tag==='select'||tag==='option'||tag==='input'||tag==='button') return;\n  STATE.expandedTaskId=STATE.expandedTaskId===taskId?null:taskId;\n  render();\n}\nfunction renderModal(){\n  if (!STATE.modal) return '';\n  const m=STATE.modal;\n  if (m.kind==='STATUS_CHANGE'){\n    const {arrow,note}=statusTransitionCopy(m.oldStatus,m.newStatus);\n    const isD=m.newStatus==='BLOCKED'||(m.oldStatus==='DONE'&&m.newStatus!=='DONE');\n    return `<div class=\"modal-backdrop\" onclick=\"cancelStatusChange()\"><div class=\"modal\" onclick=\"event.stopPropagation()\">\n      <div class=\"modal-title\">Confirm status change<\u002Fdiv>\n      <div class=\"modal-body\">Change <span class=\"hl\">${m.taskTitle}<\u002Fspan>: <span class=\"hl\">${arrow}<\u002Fspan>?${note?`<div class=\"note\">${note}<\u002Fdiv>`:''}<\u002Fdiv>\n      <div class=\"modal-actions\">\n        <button class=\"modal-btn secondary\" onclick=\"cancelStatusChange()\">Cancel<\u002Fbutton>\n        <button class=\"modal-btn ${isD?'danger':'primary'}\" onclick=\"confirmStatusChange()\">Confirm<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>`;\n  }\n  return '';\n}\nfunction handleCriteriaToggle(event,projectId,criteriaId){\n  const p=getProject(projectId); let crit=null,pm=null;\n  for(const m of p.milestones){const c=m.criteria.find(x=>x.id===criteriaId);if(c){crit=c;pm=m;break;}}\n  if (!crit||!pm) return;\n  const will=!crit.completed;\n  if (!confirm((will?'Tick':'Untick')+\" '\"+crit.text+\"' under '\"+pm.title+\"'?\")){event.preventDefault();return;}\n  crit.completed=will;\n  writeLog(p,'CRITERIA_TOGGLE',\"Acceptance criterion '\"+crit.text+\"' \"+(will?'checked':'unchecked'),p.ownerId);\n  if (pm.criteria.every(c=>c.completed)) writeLog(p,'MILESTONE_COMPLETE',\"Milestone '\"+pm.title+\"' completed\",p.ownerId);\n  saveState(); render();\n}\nfunction submitManualLog(projectId){\n  const el=document.getElementById('manual-log-input'), text=(el.value||'').trim();\n  if (!text){alert('Please enter a description.');return;}\n  const p=getProject(projectId); writeLog(p,'MANUAL',text, STATE.currentUserId || p.ownerId);\n  saveState(); render();\n}\nfunction navigateToProject(id){STATE.view='project';STATE.selectedProjectId=id;STATE.selectedProcessId=null;STATE.selectedEventId=null;STATE.expandedTaskId=null;STATE.logFilterUser='all';STATE.logFilterType='all';STATE.isEditMode=false;render();window.scrollTo(0,0);}\nfunction navigateToProcess(id){STATE.view='annual';STATE.selectedProcessId=id;STATE.selectedProjectId=null;STATE.selectedEventId=null;STATE.expandedTaskId=null;render();window.scrollTo(0,0);}\nfunction navigateToEvent(id){STATE.view='event';STATE.selectedEventId=id;STATE.selectedProjectId=null;STATE.selectedProcessId=null;STATE.expandedTaskId=null;render();window.scrollTo(0,0);}\nfunction navigateToOverview(){STATE.view='overview';STATE.selectedProjectId=null;STATE.selectedProcessId=null;STATE.selectedEventId=null;STATE.expandedTaskId=null;STATE.createDraft=null;STATE.createKind=null;render();window.scrollTo(0,0);}\nfunction setSortBy(key){STATE.sortBy=key;render();}\nfunction toggleLogExpanded(){STATE.logExpanded=!STATE.logExpanded;render();}\nfunction toggleGantt(layer){STATE.ganttToggles[layer]=!STATE.ganttToggles[layer];saveState();render();}\nfunction toggleProjectVisibility(id){\n  if(!STATE.ganttHiddenProjects) STATE.ganttHiddenProjects=new Set();\n  if(STATE.ganttHiddenProjects.has(id)) STATE.ganttHiddenProjects.delete(id);\n  else STATE.ganttHiddenProjects.add(id);\n  // keep dropdown open\n  STATE.projFilterOpen = true;\n  render();\n  // re-open after render\n  const dd = document.getElementById('proj-filter-dd');\n  if(dd) dd.style.display = 'block';\n}\nfunction toggleProjFilterDD(e){\n  e.stopPropagation();\n  STATE.projFilterOpen = !STATE.projFilterOpen;\n  const dd = document.getElementById('proj-filter-dd');\n  if(dd) dd.style.display = STATE.projFilterOpen ? 'block' : 'none';\n}\nfunction toggleEditHolidays(){ STATE.editingHolidays=!STATE.editingHolidays; render(); }\nfunction toggleEditCulture(){ STATE.editingCulture=!STATE.editingCulture; render(); }\nfunction setLogFilter(kind, value) {\n  if (kind === 'user') STATE.logFilterUser = value;\n  else if (kind === 'type') STATE.logFilterType = value;\n  render();\n}\nfunction clearLogFilter() {\n  STATE.logFilterUser = 'all'; STATE.logFilterType = 'all'; render();\n}\n\n\n//================================================================\n// LOGIN SYSTEM\n//================================================================\nconst LOGIN_GREETINGS = [\n  \"Back. Let's see what broke.\",\n  \"Oh look, another Monday.\",\n  \"Everything's fine. Probably.\",\n  \"The projects won't check themselves.\",\n  \"You're early. That's suspicious.\",\n  \"Time to pretend we're on track.\",\n  \"Welcome. The blockers missed you.\",\n  \"Nothing escalated while you were gone. Bold assumption.\",\n  \"Your inbox called. It wasn't pretty.\",\n  \"Status: at risk until proven otherwise.\",\n  \"Let's audit some assumptions today.\",\n  \"Ready when you are. The data isn't.\",\n  \"Same projects. Different week. Let's go.\",\n  \"Your stakeholders are already wondering where you are.\",\n];\n\nconst TRANSITION_MSGS = [\n  (name) => `You're in, ${name}. Syncing your world.`,\n  (name) => `Loading context for ${name}. One moment.`,\n  (name) => `${name} authenticated. Pulling your portfolio.`,\n  (name) => `Welcome back, ${name}. Preparing your view.`,\n  (name) => `${name} confirmed. Calibrating the dashboard.`,\n  (name) => `Booting for ${name}. Connecting the dots.`,\n  (name) => `${name} — context loaded. Stand by.`,\n  (name) => `You're ${name}. We know what to do.`,\n  (name) => `Restoring your session, ${name}. Almost there.`,\n  (name) => `${name} is in. Initialising the matrix.`,\n  (name) => `Handshake confirmed, ${name}. Loading state.`,\n  (name) => `${name} — welcome to the panopticon.`,\n];\n\nfunction pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }\n\nlet _selectedLoginUser = null;\n\nfunction initLoginScreen() {\n  // Greeting\n  document.getElementById('login-greeting').textContent = pick(LOGIN_GREETINGS);\n\n  // Build user cards from USERS object\n  const grid = document.getElementById('login-user-grid');\n  grid.innerHTML = Object.values(USERS).map(u => `\n    <div class=\"login-user-card\" id=\"luc-${u.id}\" onclick=\"selectLoginUser('${u.id}')\">\n      <div class=\"login-user-avatar\">${u.initials}<\u002Fdiv>\n      <div class=\"login-user-name\">${u.name}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\nfunction selectLoginUser(userId) {\n  // Deselect previous\n  if (_selectedLoginUser) {\n    const prev = document.getElementById('luc-' + _selectedLoginUser);\n    if (prev) prev.classList.remove('selected');\n  }\n  _selectedLoginUser = userId;\n  const card = document.getElementById('luc-' + userId);\n  if (card) card.classList.add('selected');\n\n  // Enable login button\n  const btn = document.getElementById('login-btn');\n  btn.classList.add('enabled');\n}\n\nfunction doLogin() {\n  if (!_selectedLoginUser) return;\n  const user = USERS[_selectedLoginUser];\n  if (!user) return;\n\n  // Show transition screen\n  document.getElementById('login-screen').classList.add('hidden');\n  const ts = document.getElementById('transition-screen');\n  ts.classList.remove('hidden');\n\n  // Set transition message\n  const msgFn = pick(TRANSITION_MSGS);\n  document.getElementById('transition-msg').textContent = msgFn(user.name);\n\n  // After delay, boot the app\n  setTimeout(() => {\n    STATE.currentUserId = _selectedLoginUser;\n    STATE.isLoggedIn = true;\n    ts.classList.add('hidden');\n    loadState();\n    render();\n  }, 1250);\n}\n\nfunction render(){\n  const root=document.getElementById('app');\n  let body;\n  if(STATE.view==='create')      body=renderCreateForm();\n  else if(STATE.view==='project') body=renderProject(STATE.selectedProjectId);\n  else if(STATE.view==='annual')  body=renderAnnualProcess(STATE.selectedProcessId);\n  else if(STATE.view==='event')   body=renderProjectEvent(STATE.selectedEventId);\n  else                            body=renderOverview();\n  root.innerHTML=body+renderModal();\n}\n\n// Boot: show login screen first; app loads only after login.\ninitLoginScreen();\n\n\n\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
